<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="140" fill="url(#purpleGradient)"/>
  
  <!-- Decorative Elements -->
  <rect x="50" y="80" width="60" height="60" rx="8" fill="#EC4899" opacity="0.9"/>
  <rect x="290" y="260" width="60" height="60" rx="8" fill="#FBBF24" opacity="0.9"/>
  <rect x="280" y="180" width="50" height="50" rx="8" fill="#22D3EE" opacity="0.9"/>
  
  <!-- DJ Equipment Base -->
  <rect x="100" y="240" width="200" height="80" rx="12" fill="url(#pinkGradient)"/>
  
  <!-- Deck Details -->
  <circle cx="150" cy="270" r="15" fill="#FFF" opacity="0.3"/>
  <circle cx="150" cy="270" r="8" fill="#FFF" opacity="0.5"/>
  <circle cx="250" cy="270" r="15" fill="#FFF" opacity="0.3"/>
  <circle cx="250" cy="270" r="8" fill="#FFF" opacity="0.5"/>
  
  <!-- Equalizer Bars -->
  <rect x="180" y="250" width="8" height="40" rx="4" fill="#22D3EE" opacity="0.8"/>
  <rect x="192" y="240" width="8" height="50" rx="4" fill="#EC4899" opacity="0.8"/>
  <rect x="204" y="255" width="8" height="35" rx="4" fill="#FBBF24" opacity="0.8"/>
  <rect x="216" y="245" width="8" height="45" rx="4" fill="#22D3EE" opacity="0.8"/>
  
  <!-- DJ Character (Simplified) -->
  <!-- Head -->
  <circle cx="200" cy="160" r="30" fill="#FDB4A5"/>
  
  <!-- Hair -->
  <ellipse cx="185" cy="145" rx="25" ry="20" fill="#FF8C42"/>
  <ellipse cx="215" cy="145" rx="25" ry="20" fill="#FF8C42"/>
  
  <!-- Body -->
  <path d="M170 185 Q200 195 230 185 L240 230 L160 230 Z" fill="#EC4899"/>
  
  <!-- Arms -->
  <ellipse cx="155" cy="210" rx="12" ry="25" fill="#FDB4A5" transform="rotate(-20 155 210)"/>
  <ellipse cx="245" cy="210" rx="12" ry="25" fill="#FDB4A5" transform="rotate(20 245 210)"/>
  
  <!-- Hand raised (right) -->
  <ellipse cx="250" cy="170" rx="10" ry="15" fill="#FDB4A5" transform="rotate(30 250 170)"/>
  
  <!-- Face details -->
  <circle cx="190" cy="160" r="3" fill="#333"/>
  <circle cx="210" cy="160" r="3" fill="#333"/>
  <path d="M195 170 Q200 175 205 170" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Speakers -->
  <rect x="60" y="150" width="40" height="60" rx="8" fill="#7C3AED" opacity="0.7"/>
  <circle cx="80" cy="170" r="8" fill="#FFF" opacity="0.3"/>
  <circle cx="80" cy="190" r="8" fill="#FFF" opacity="0.3"/>
  
  <rect x="300" y="150" width="40" height="60" rx="8" fill="#7C3AED" opacity="0.7"/>
  <circle cx="320" cy="170" r="8" fill="#FFF" opacity="0.3"/>
  <circle cx="320" cy="190" r="8" fill="#FFF" opacity="0.3"/>
  
  <!-- Sparkles -->
  <circle cx="130" cy="120" r="3" fill="#FFF" opacity="0.8"/>
  <circle cx="270" cy="130" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="160" cy="100" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="240" cy="110" r="3" fill="#FFF" opacity="0.8"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
